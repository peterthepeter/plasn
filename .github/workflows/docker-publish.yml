name: Build and publish Docker image

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "DESIGN.md"
      - ".gitignore"
      - "public/favicon.ico"
      - "public/plasn-mark-256.png"
      - "public/plasn-mark.svg"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  PRIVATE_IMAGE_NAME: ${{ github.repository }}
  PUBLIC_IMAGE_NAME: ${{ github.repository_owner }}/plasn-public
  DOCKER_PLATFORMS: linux/amd64,linux/arm64

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build public app
        run: npm run build

      - name: Build private app
        env:
          PLASN_SITE_URL: ${{ secrets.PLASN_SITE_URL }}
          VITE_CF_WEB_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_WEB_ANALYTICS_TOKEN }}
        run: npm run build

  publish-private:
    name: Publish private image (${{ matrix.platform }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare platform metadata
        id: prep
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "platform_pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push private Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          build-args: |
            PLASN_SITE_URL=${{ secrets.PLASN_SITE_URL }}
            VITE_CF_WEB_ANALYTICS_TOKEN=${{ secrets.CLOUDFLARE_WEB_ANALYTICS_TOKEN }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.PRIVATE_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export private image digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload private digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: private-digests-${{ steps.prep.outputs.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-private:
    name: Merge private image
    runs-on: ubuntu-latest
    needs: publish-private

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download private digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: private-digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create private multi-arch manifest
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.PRIVATE_IMAGE_NAME }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          sources=()
          for digest_path in /tmp/digests/*; do
            digest="sha256:$(basename "$digest_path")"
            sources+=("${IMAGE_NAME}@${digest}")
          done

          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            --tag "${IMAGE_NAME}:sha-${short_sha}" \
            "${sources[@]}"

      - name: Inspect private image manifest
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.PRIVATE_IMAGE_NAME }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          docker buildx imagetools inspect "${IMAGE_NAME}:sha-${short_sha}"

  publish-public:
    name: Publish public image (${{ matrix.platform }})
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare platform metadata
        id: prep
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "platform_pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push public Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.PUBLIC_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export public image digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload public digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: public-digests-${{ steps.prep.outputs.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-public:
    name: Merge public image
    runs-on: ubuntu-latest
    needs: publish-public

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download public digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: public-digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create public multi-arch manifest
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.PUBLIC_IMAGE_NAME }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          sources=()
          for digest_path in /tmp/digests/*; do
            digest="sha256:$(basename "$digest_path")"
            sources+=("${IMAGE_NAME}@${digest}")
          done

          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            --tag "${IMAGE_NAME}:sha-${short_sha}" \
            "${sources[@]}"

      - name: Inspect public image manifest
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.PUBLIC_IMAGE_NAME }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          docker buildx imagetools inspect "${IMAGE_NAME}:sha-${short_sha}"
