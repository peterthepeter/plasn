name: Build and publish Docker image

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "CHANGELOG.md"
      - "DESIGN.md"
      - ".gitignore"
      - "public/favicon.ico"
      - "public/plasn-mark-256.png"
      - "public/plasn-mark.svg"
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Which image variant should be published?"
        required: true
        default: both
        type: choice
        options:
          - both
          - private
          - public

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  PRIVATE_IMAGE_NAME: ${{ github.repository }}
  PUBLIC_IMAGE_NAME: ${{ github.repository_owner }}/plasn-public
  DOCKER_PLATFORMS: linux/amd64,linux/arm64

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build public app
        if: |
          (github.event_name == 'push' && !contains(github.event.head_commit.message, '[private-only]')) ||
          (github.event_name == 'workflow_dispatch' && (inputs.publish_target == 'both' || inputs.publish_target == 'public'))
        run: npm run build

      - name: Build private app
        if: |
          (github.event_name == 'push' && !contains(github.event.head_commit.message, '[public-only]')) ||
          (github.event_name == 'workflow_dispatch' && (inputs.publish_target == 'both' || inputs.publish_target == 'private'))
        env:
          PLASN_SITE_URL: ${{ secrets.PLASN_SITE_URL }}
          VITE_CF_WEB_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_WEB_ANALYTICS_TOKEN }}
        run: npm run build

  publish-private:
    name: Publish private image (${{ matrix.platform }})
    needs: test
    if: |
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[public-only]')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.publish_target == 'both' || inputs.publish_target == 'private'))
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare platform metadata
        id: prep
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "platform_pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push private Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            PLASN_SITE_URL=${{ secrets.PLASN_SITE_URL }}
          secrets: |
            "vite_cf_web_analytics_token=${{ secrets.CLOUDFLARE_WEB_ANALYTICS_TOKEN }}"
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.PRIVATE_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export private image digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload private digest artifact
        uses: actions/upload-artifact@v6
        with:
          name: private-digests-${{ steps.prep.outputs.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-private:
    name: Merge private image
    runs-on: ubuntu-latest
    needs: publish-private
    if: |
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[public-only]')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.publish_target == 'both' || inputs.publish_target == 'private'))

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download private digest artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: private-digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create private multi-arch manifest
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.PRIVATE_IMAGE_NAME }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          sources=()
          for digest_path in /tmp/digests/*; do
            digest="sha256:$(basename "$digest_path")"
            sources+=("${IMAGE_NAME}@${digest}")
          done

          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            --tag "${IMAGE_NAME}:sha-${short_sha}" \
            "${sources[@]}"

      - name: Inspect private image manifest
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.PRIVATE_IMAGE_NAME }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          docker buildx imagetools inspect "${IMAGE_NAME}:sha-${short_sha}"

  publish-public:
    name: Publish public image (${{ matrix.platform }})
    needs: test
    if: |
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[private-only]')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.publish_target == 'both' || inputs.publish_target == 'public'))
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare platform metadata
        id: prep
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "platform_pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push public Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.PUBLIC_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export public image digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload public digest artifact
        uses: actions/upload-artifact@v6
        with:
          name: public-digests-${{ steps.prep.outputs.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-public:
    name: Merge public image
    runs-on: ubuntu-latest
    needs: publish-public
    if: |
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[private-only]')) ||
      (github.event_name == 'workflow_dispatch' && (inputs.publish_target == 'both' || inputs.publish_target == 'public'))

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download public digest artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: public-digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create public multi-arch manifest
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.PUBLIC_IMAGE_NAME }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          sources=()
          for digest_path in /tmp/digests/*; do
            digest="sha256:$(basename "$digest_path")"
            sources+=("${IMAGE_NAME}@${digest}")
          done

          docker buildx imagetools create \
            --tag "${IMAGE_NAME}:latest" \
            --tag "${IMAGE_NAME}:sha-${short_sha}" \
            "${sources[@]}"

      - name: Inspect public image manifest
        env:
          IMAGE_NAME: ${{ env.REGISTRY }}/${{ env.PUBLIC_IMAGE_NAME }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          docker buildx imagetools inspect "${IMAGE_NAME}:sha-${short_sha}"
